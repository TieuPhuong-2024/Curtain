version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongodb_data:/data/db
    networks:
      - curtain_network

  backend:
    build: ./backend
    container_name: curtain_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/curtainapp?authSource=admin
    networks:
      - curtain_network

  frontend:
    build: ./frontend
    container_name: curtain_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    networks:
      - curtain_network

networks:
  curtain_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local